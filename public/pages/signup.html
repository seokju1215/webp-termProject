<!DOCTYPE html>
<html lang="ko" data-theme="">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QAFlow — 회원가입</title>
  <script>(function(){const t=localStorage.getItem('theme')||'';document.documentElement.setAttribute('data-theme',t);})()</script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" />
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="stylesheet" href="/css/components.css" />
  <style>
    .auth-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }
    .auth-box { width: 100%; max-width: 420px; }
    .auth-logo { text-align: center; margin-bottom: 2rem; }
    .auth-logo .logo-text { font-size: 1.5rem; font-weight: 800; color: var(--color-primary); }
    .auth-logo .logo-sub { font-size: 0.875rem; color: var(--color-text-muted); margin-top: 0.25rem; }
    .auth-form { display: flex; flex-direction: column; gap: 1rem; }
    .theme-toggle-fixed { position: fixed; top: 1rem; right: 1rem; }
    .auth-divider { display: flex; align-items: center; gap: 0.75rem; color: var(--color-text-muted); font-size: 0.8125rem; margin: 0.5rem 0; }
    .auth-divider::before, .auth-divider::after { content: ''; flex: 1; height: 1px; background: var(--color-border); }
    .btn-google { width: 100%; padding: 0.625rem; border: 1px solid var(--color-border); border-radius: var(--radius); background: var(--color-surface); color: var(--color-text); font-size: 0.9375rem; font-weight: 500; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 0.625rem; text-decoration: none; transition: background var(--transition); }
    .btn-google:hover { background: var(--color-surface-2); }
    .google-icon { width: 18px; height: 18px; flex-shrink: 0; }
  </style>
</head>
<body>
  <button class="theme-toggle theme-toggle-fixed" id="theme-btn" aria-label="다크모드 토글">🌙</button>

  <main class="auth-page">
    <div class="auth-box">
      <div class="auth-logo">
        <div class="logo-text">QAFlow</div>
        <div class="logo-sub">새 계정 만들기</div>
      </div>

      <div class="card">
        <h2 class="text-center mb-2">회원가입</h2>

        <form class="auth-form" id="signup-form" novalidate>
          <div class="form-group">
            <label class="form-label" for="name">이름</label>
            <input class="form-input" type="text" id="name" placeholder="홍길동" autocomplete="name" />
            <span class="form-error hidden" id="name-error"></span>
          </div>
          <div class="form-group">
            <label class="form-label" for="email">이메일</label>
            <input class="form-input" type="email" id="email" placeholder="you@example.com" autocomplete="email" />
            <span class="form-error hidden" id="email-error"></span>
          </div>
          <div class="form-group">
            <label class="form-label" for="password">비밀번호 <span class="text-muted">(6자 이상)</span></label>
            <input class="form-input" type="password" id="password" placeholder="••••••••" autocomplete="new-password" />
            <span class="form-error hidden" id="password-error"></span>
          </div>
          <span class="form-error hidden" id="form-error"></span>
          <button type="submit" class="btn btn-primary btn-full btn-lg" id="signup-btn">가입하기</button>
        </form>

        <div class="auth-divider mt-2">또는</div>
        <a href="/api/auth/google" class="btn-google">
          <svg class="google-icon" viewBox="0 0 24 24">
            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
          </svg>
          Google로 가입
        </a>

        <p class="text-center text-sm text-muted mt-2">
          이미 계정이 있으신가요? <a href="/">로그인</a>
        </p>
      </div>
    </div>
  </main>

  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script type="module" src="/js/pages/signup.js"></script>
</body>
</html>
